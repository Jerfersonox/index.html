<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mundo Inclusivo</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(135deg,#4facfe,#00f2fe);
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
 color:#333;
}

.box{
 background:white;
 padding:25px;
 border-radius:20px;
 width:90%;
 max-width:400px;
 box-shadow:0 10px 30px rgba(0,0,0,0.2);
 text-align:center;
 animation:fade 0.5s;
}

@keyframes fade{
 from{opacity:0; transform:translateY(20px);}
 to{opacity:1;}
}

h2{
 margin-bottom:20px;
}

input{
 width:100%;
 padding:12px;
 margin:8px 0;
 border-radius:10px;
 border:1px solid #ccc;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-size:16px;
 background:#4facfe;
 color:white;
 font-weight:bold;
 cursor:pointer;
}

button:hover{
 background:#007bff;
}

.hidden{display:none;}

/* MENU */
.menu button{
 background:#00c853;
}

/* JOGO */
#game{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:10px;
 margin-top:15px;
}

#game button{
 height:60px;
 font-size:20px;
 background:#eee;
}

/* WIN */
#win{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.8);
 display:none;
 justify-content:center;
 align-items:center;
 flex-direction:column;
 color:white;
 font-size:24px;
}
</style>
</head>

<body>

<div id="loginBox" class="box">
<h2>🔐 Login</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="cadastro()">Cadastrar</button>

<p id="msg"></p>
</div>

<div id="menuBox" class="box hidden menu">
<h2>🧠 Mundo Inclusivo</h2>

<button onclick="abrirJogo(4)">Fácil</button>
<button onclick="abrirJogo(6)">Médio</button>
<button onclick="abrirJogo(8)">Difícil</button>

<button onclick="abrirInfo()">Informações</button>
<button onclick="logout()">Sair</button>
</div>

<div id="jogoBox" class="box hidden">
<h2>🧩 Memória</h2>
<p>Pontos: <span id="score">0</span></p>
<div id="game"></div>
<button onclick="voltar()">Voltar</button>
</div>

<div id="infoBox" class="box hidden">
<h2>📘 Dicas</h2>

<p><b>Autismo:</b> dificuldade social e comunicação.</p>
<p><b>TDAH:</b> falta de atenção e impulsividade.</p>

<p><b>Crianças:</b> atraso na fala, agitação.</p>
<p><b>Adultos:</b> dificuldade foco e organização.</p>

<p><b>Dicas:</b></p>
<p>✔ Criar rotina</p>
<p>✔ Ter paciência</p>
<p>✔ Evitar barulho</p>

<button onclick="voltar()">Voltar</button>
</div>

<div id="win">
🎉 Parabéns!
<button onclick="fecharWin()">Continuar</button>
</div>

<script>

// CADASTRO
function cadastro(){
 let u=user.value;
 let p=pass.value;

 if(u && p){
  localStorage.setItem("user_"+u,p);
  msg.innerText="Cadastrado!";
 }
}

// LOGIN CORRIGIDO
function login(){
 let u=user.value;
 let p=pass.value;

 if(localStorage.getItem("user_"+u)===p){
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("menuBox").classList.remove("hidden");
 }else{
  msg.innerText="Usuário ou senha errados";
 }
}

// LOGOUT
function logout(){
 location.reload();
}

// NAVEGAÇÃO
function voltar(){
 jogoBox.classList.add("hidden");
 infoBox.classList.add("hidden");
 menuBox.classList.remove("hidden");
}

function abrirInfo(){
 menuBox.classList.add("hidden");
 infoBox.classList.remove("hidden");
}

// JOGO
function abrirJogo(n){
 menuBox.classList.add("hidden");
 jogoBox.classList.remove("hidden");

 let emojis=["🐶","🐱","🍎","🍌","🍇","🍉","🚗","⚽"];
 let usados=emojis.slice(0,n);
 let cards=[...usados,...usados].sort(()=>0.5-Math.random());

 game.innerHTML="";
 score.innerText=0;

 let first=null, second=null, lock=false, pontos=0;

 cards.forEach(e=>{
  let b=document.createElement("button");
  b.innerText="?";

  b.onclick=()=>{
   if(lock||b.innerText!=="?") return;

   b.innerText=e;

   if(!first){
    first=b;
   }else{
    second=b;
    lock=true;

    if(first.innerText===second.innerText){
     pontos+=10;
     score.innerText=pontos;
     first=null; second=null; lock=false;

     if(pontos===n*10){
      document.getElementById("win").style.display="flex";
     }

    }else{
     setTimeout(()=>{
      first.innerText="?";
      second.innerText="?";
      first=null; second=null; lock=false;
     },700);
    }
   }
  };

  game.appendChild(b);
 });
}

// FECHAR WIN
function fecharWin(){
 document.getElementById("win").style.display="none";
 voltar();
}

</script>

</body>
</html>
